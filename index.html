## SQL Path ŌĆö Interactive course (`index.html`)

A single-file, browser-based SQL course. Lessons run **real [SQLite](https://www.sqlite.org/)** in the page via **[sql.js](https://sql.js.org/)** (WebAssembly). There is no backend server and nothing to install.

**Main file:** `index.html`

### How to open it

1. Double-click `index.html`, or open it from your editorŌĆÖs ŌĆ£Open in browserŌĆØ action.
2. The first load needs **internet access** so the page can fetch sql.js from [jsDelivr](https://www.jsdelivr.com/) (`sql-wasm.js` + `sql-wasm.wasm`).
3. Use a current **Chrome**, **Edge**, or **Firefox**.

### Offline use

Download `sql-wasm.js` and `sql-wasm.wasm` from the [sql.js releases](https://github.com/sql-js/sql.js/releases) (match version **1.11.0** with the URLs in the file), place them next to `index.html`, and change the `&lt;script src="ŌĆ”"&gt;` and `locateFile` URL in the HTML to relative paths.

### What you get

- **Learn** steps: read in the left panel, then **Continue**.
- **Practice** steps: write SQL in the editor, **Run** to try it, **Check** to validate against the assignment (you may get specific feedback).
- **Mini-lab** steps (end of most units): checklist only; the checker gives **pass/fail** style messages without teaching the solution.
- **Capstone** (final step): larger solo project with automated checks.

Progress is **linear**: the next lesson stays locked until the previous one is completed.

### Curriculum (16 units + capstone)

| Unit | Topics |
|------|--------|
| 1 ┬Ę Foundations &amp; DDL | Relational basics, types, `CREATE TABLE`, inserts, early `SELECT` |
| 2 ┬Ę Filtering rows | `WHERE`, `AND`/`OR`, `IN`, `BETWEEN`, `LIKE` |
| 3 ┬Ę Sorting &amp; NULL | `ORDER BY`, `LIMIT`/`OFFSET`, `DISTINCT`, `NULL` |
| 4 ┬Ę Changing data | `INSERT`, `UPDATE`, `DELETE`, `INSERTŌĆ”SELECT` |
| 5 ┬Ę Keys &amp; relations | Primary/foreign keys, composite keys |
| 6 ┬Ę JOINs | Inner/left joins, joins with aggregates |
| 7 ┬Ę Aggregates | `GROUP BY`, `HAVING`, `SUM` / counts |
| 8 ┬Ę Subqueries &amp; CTEs | `IN`, `EXISTS`, `WITH` (CTEs) |
| 9 ┬Ę UNION &amp; cleanup | `UNION`, `COALESCE` / `NULLIF` |
| 10 ┬Ę Constraints &amp; indexes | `CHECK`, `UNIQUE`, `CREATE INDEX`, `EXPLAIN` concepts |
| 11 ┬Ę Transactions | `BEGIN`, `COMMIT`, `ROLLBACK`, batch safety |
| 12 ┬Ę CASE &amp; dates | `CASE` expressions, `strftime` / date handling |
| 13 ┬Ę Window functions | `ROW_NUMBER`, `SUM() OVER`, partitions |
| 14 ┬Ę Upsert | `ON CONFLICT DO UPDATE` / idempotent writes |
| 15 ┬Ę Self-joins | Same-table joins, org-style data |
| 16 ┬Ę Capstone | End-to-end schema + views (school enrollment) |

Units **1ŌĆō9** and **10ŌĆō15** each end with a **mini-lab**; **16** is only the capstone.

There are **67** steps total (including learn, practice, mini-labs, and the final capstone).

### Editor shortcuts

| Action | Shortcut |
|--------|----------|
| Run SQL | **Ctrl+Enter** (Cmd+Enter on macOS) |
| Check answer | **Shift+Ctrl+Enter** |
| Indent | **Tab** (two spaces); **Shift+Tab** outdents |

### Progress and XP

- Completion and **XP** are stored in the browser under the key **`sql-path-progress-v4`** (`localStorage`).
- Clearing site data for the fileŌĆÖs origin resets progress.
- If the course structure changes in a future version, the progress key may be bumped; older keys will not apply to a new layout.

### Maintainer note: splicing curriculum

[`splice_curriculum.py`](splice_curriculum.py) is a small helper that can replace the `/* ŌĆöŌĆöŌĆö Curriculum ŌĆöŌĆöŌĆö */` block in `index.html` with the contents of a separate text file. The authoritative curriculum in this repo is **inside** `index.html`; the script is optional for bulk edits.

## CompTIA Tech+ (FC0-U71) ŌĆö Interactive Study Guide

A **single-file, browser-based** study guide for **CompTIA Tech+** certification. No build step, no npmŌĆöopen the HTML, study offline or online, and track progress in your browser.

&gt; **Disclaimer:** This project is **independent study material**. It is not affiliated with, sponsored by, or endorsed by CompTIA. Exam names and objectives are trademarks of their respective owners. Passing the real exam depends on your preparation and Pearson VUE testing conditionsŌĆönot on this repository.

---

### Features

| Feature | Description |
|--------|-------------|
| **Seven domain chapters** | IT concepts, infrastructure, applications &amp; OS, software development, data &amp; databases, security, plus acronyms &amp; drills. |
| **Lesson-style content** | Narrative explanations, tables, scenarios, ŌĆ£Exam EssentialsŌĆØ recap blocks, and troubleshooting flow. |
| **Progress tracking** | Per-objective checkboxes and optional ŌĆ£Skip ŌĆö I know thisŌĆØ per domain; progress bar excludes skipped modules. |
| **Chapter check-ins** | Five-question mini-quizzes after each chapter with explanations. |
| **Full practice exam** | **52 questions** (46 single-choice + **6 select-all-that-apply**), shuffled sessions, grading with explanations. |
| **45-minute timer** | Optional exam-pace drill on the practice page. |
| **Acronym table** | Large built-in glossary with **search/filter** and a **matching drill** (random rounds). |
| **Study mode** | Fullscreen toggle for fewer distractions. |
| **Persistence** | State saved in **`localStorage`** under the key `techplusStudyGuide_v1` (same browser/profile). |
| **Pass-readiness contract** | Checklist on the home screen for how to prep before scheduling the real test. |

---

### Quick start

1. Clone or download this repository.
2. Open **`TechPlus_Study_Guide.html`** in a modern browser (Chrome, Edge, Firefox, or Safari).
3. Use the left sidebar to navigate **Home**, chapters **1ŌĆō7**, or **Practice exam**.

**Important:** Some browsers restrict `localStorage` or file access when opening HTML via `file://`. If anything behaves oddly, serve the folder with a tiny static server, for example:

```bash
# Python 3
python -m http.server 8080
```

Then open `http://localhost:8080/TechPlus_Study_Guide.html`.

### How to study (recommended)

1. Read chapters **1 ŌåÆ 7** in order; complete each **Chapter check-in** mini-quiz.
2. Check off objectives only when you could explain them **without** reading.
3. Use the **acronym** table + **matching drill** until rounds feel easy.
4. Take the **practice exam** multiple times on **shuffled** sessions; use the **45-minute timer** for at least one full run.
5. Follow the **pass-readiness contract** on the Home page before booking the exam.

  <script>
    (function () {
      var cards = document.getElementById("link-cards");
      if (cards) {

            row.rel = "noopener noreferrer";

            row.appendChild(lab);

            wrap.appendChild(row);
          }

          if (item.site || item.repo) {
            addRow("Site", item.site);
            addRow("Repository", item.repo);
          } else if (item.url) {
            addRow("Link", item.url);
          }

          if (item.note) {
            var n = document.createElement("p");
            n.className = "card-note";
            n.style.marginTop = "0.75rem";
            n.textContent = item.note;
            wrap.appendChild(n);
          }

          cards.appendChild(wrap);
        });
      }
      }

      var ta = document.getElementById("readme-md");
      var out = document.getElementById("readme-out");
      var tablist = document.getElementById("readme-tabs");
      if (ta && out && typeof marked !== "undefined" && typeof DOMPurify !== "undefined") {
        var raw = ta.value;
        var html = marked.parse(raw);
        out.innerHTML = DOMPurify.sanitize(html);
        setupReadmeTabs(out, tablist);
      } else if (out) {
        out.textContent = "Could not load markdown renderer.";
      }

      function activateReadmeTab(index) {
        var panels = document.querySelectorAll("#readme-out .readme-section");
        var tabs = document.querySelectorAll("#readme-tabs .readme-tab");
        if (!panels.length) return;
        var i = Math.max(0, Math.min(index, panels.length - 1));
        panels.forEach(function (p, j) {
          p.hidden = j !== i;
        });
        tabs.forEach(function (t, j) {
          t.setAttribute("aria-selected", j === i ? "true" : "false");
          t.tabIndex = j === i ? 0 : -1;
        });
        try {
          history.replaceState(null, "", "#readme-" + i);
        } catch (err) {}
      }

      function partitionReadme(readmeOut) {
        var hlist = Array.from(readmeOut.querySelectorAll("h1, h2"));
        if (!hlist.length) return [];

        var frag = document.createDocumentFragment();
        var panels = [];

        for (var i = 0; i < hlist.length; i++) {
          var start = hlist[i];
          if (!readmeOut.contains(start)) continue;
          var end = hlist[i + 1] || null;
          var panel = document.createElement("div");
          panel.className = "readme-section markdown-body";
          panel.setAttribute("role", "tabpanel");
          panel.id = "readme-section-" + i;
          panel.hidden = i !== 0;

          var node = start;
          while (node) {
            if (end && node === end) break;
            var nxt = node.nextElementSibling;
            panel.appendChild(node);
            node = nxt;
          }
          frag.appendChild(panel);
          panels.push(panel);
        }

        readmeOut.textContent = "";
        readmeOut.appendChild(frag);
        return panels;
      }

      function setupReadmeTabs(readmeOut, tabsEl) {
        if (!tabsEl) return;
        var panels = partitionReadme(readmeOut);
        if (!panels.length) {
          tabsEl.hidden = true;
          return;
        }

        if (panels.length < 2) {
          tabsEl.hidden = true;
          panels[0].hidden = false;
          return;
        }

        tabsEl.hidden = false;
        tabsEl.textContent = "";

        panels.forEach(function (panel, i) {
          var heading = panel.querySelector("h1, h2");
          var label = heading ? heading.textContent.trim() : "Section " + (i + 1);
          if (label.length > 42) label = label.slice(0, 40) + "ŌĆ”";

          var tab = document.createElement("button");
          tab.type = "button";
          tab.className = "readme-tab";
          tab.setAttribute("role", "tab");
          tab.setAttribute("aria-selected", i === 0 ? "true" : "false");
          tab.setAttribute("aria-controls", panel.id);
          tab.id = "readme-tab-" + i;
          tab.textContent = label;
          tab.tabIndex = i === 0 ? 0 : -1;
          panel.setAttribute("aria-labelledby", tab.id);

          tab.addEventListener("click", function () {
            activateReadmeTab(i);
            tab.focus();
          });

          tabsEl.appendChild(tab);
        });

        tabsEl.addEventListener("keydown", function (ev) {
          var tabs = Array.from(tabsEl.querySelectorAll(".readme-tab"));
          var cur = tabs.indexOf(document.activeElement);
          if (cur < 0) return;
          var next = cur;
          if (ev.key === "ArrowRight" || ev.key === "ArrowDown") {
            ev.preventDefault();
            next = (cur + 1) % tabs.length;
          } else if (ev.key === "ArrowLeft" || ev.key === "ArrowUp") {
            ev.preventDefault();
            next = (cur - 1 + tabs.length) % tabs.length;
          } else if (ev.key === "Home") {
            ev.preventDefault();
            next = 0;
          } else if (ev.key === "End") {
            ev.preventDefault();
            next = tabs.length - 1;
          } else {
            return;
          }
          activateReadmeTab(next);
          tabs[next].focus();
        });

        var m = location.hash.match(/^#readme-(\d+)$/);
        if (m) {
          var ix = parseInt(m[1], 10);
          if (ix >= 0 && ix < panels.length) activateReadmeTab(ix);
        }
      }
    })();
  </script>
</body>
</html>
